services:
  perpetum:
    build:
      context: .
    image: perpetum:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
