<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — Perpetum</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <a class="brand" href="/">Perpetum<span>●</span></a>
      <h1>Вход в сервис</h1>
      <p>Введите данные доступа администратора.</p>
      <form id="login-form">
        <label>Логин<input id="username" autocomplete="username" required></label>
        <label>Пароль<input id="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">Войти</button>
      </form>
      <div id="login-error" class="login-error" role="alert"></div>
    </section>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
